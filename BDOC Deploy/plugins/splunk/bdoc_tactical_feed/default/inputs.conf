#
# BDOC Tactical Feed — Inputs Configuration
# Defines scheduled searches that feed BDOC
#

[bdoc_threat_export]
disabled = true
interval = 300
search = index=main sourcetype=firewall OR sourcetype=ids OR sourcetype=proxy action=blocked OR action=denied | iplocation src_ip | where isnotnull(lat) | eval severity=case(action=="blocked" AND sourcetype=="ids", "HIGH", action=="blocked", "MEDIUM", 1==1, "LOW") | table _time src_ip dest_ip lat lon Country City severity sourcetype action | head 500
description = Export blocked/denied events with geolocation to BDOC every 5 minutes
