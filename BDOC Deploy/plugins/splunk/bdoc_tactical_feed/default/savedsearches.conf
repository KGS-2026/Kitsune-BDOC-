#
# BDOC Tactical Feed — Saved Searches
#

[BDOC - Threat Events (Last 24h)]
search = index=main (sourcetype=firewall OR sourcetype=ids OR sourcetype=syslog OR sourcetype=wineventlog) (action=blocked OR action=denied OR severity=critical OR severity=high) | iplocation src_ip | where isnotnull(lat) | eval threat_level=case(severity=="critical",5,severity=="high",4,severity=="medium",3,severity=="low",2,1==1,1) | eval category=case(sourcetype=="ids","INTRUSION",sourcetype=="firewall","FIREWALL",sourcetype=="proxy","PROXY",1==1,"GENERAL") | stats count as event_count latest(_time) as last_seen values(action) as actions by src_ip lat lon Country City category threat_level | sort -threat_level -event_count | head 1000
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
description = Geolocation-enriched threat events for BDOC globe. Run manually or schedule.
is_visible = true
disabled = false

[BDOC - APT Indicators]
search = index=threat_intel OR index=main sourcetype=stix OR sourcetype=taxii OR tag=apt | iplocation src_ip | where isnotnull(lat) | eval apt_group=coalesce(threat_group, vendor_threat, "UNKNOWN") | table _time src_ip dest_ip lat lon Country apt_group confidence indicator_type | sort -_time | head 500
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
description = APT indicator feed with geolocation for BDOC threat layer
is_visible = true
disabled = false

[BDOC - Network Anomalies]
search = index=main sourcetype=firewall OR sourcetype=netflow | stats count as conn_count dc(dest_port) as port_spread sum(bytes_out) as total_bytes by src_ip | where conn_count > 1000 OR port_spread > 50 OR total_bytes > 1073741824 | iplocation src_ip | where isnotnull(lat) | eval anomaly_type=case(port_spread>50,"PORT_SCAN",conn_count>5000,"FLOOD",total_bytes>1073741824,"EXFIL",1==1,"ANOMALY") | table src_ip lat lon Country City conn_count port_spread total_bytes anomaly_type
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
description = Anomalous network behavior for BDOC anomaly overlay
is_visible = true
disabled = false

[BDOC - Authentication Failures]
search = index=main (sourcetype=wineventlog EventCode=4625) OR (sourcetype=linux_secure "Failed password") OR (sourcetype=syslog "authentication failure") | iplocation src_ip | where isnotnull(lat) | stats count as fail_count dc(user) as targeted_users values(user) as users by src_ip lat lon Country City | where fail_count > 10 | sort -fail_count | head 200
dispatch.earliest_time = -4h@h
dispatch.latest_time = now
description = Brute force / credential stuffing geolocation for BDOC
is_visible = true
disabled = false

[BDOC - Malware Detections]
search = index=main sourcetype=symantec:ep:security:file OR sourcetype=crowdstrike:events OR sourcetype=defender:atp OR tag=malware | iplocation src_ip | where isnotnull(lat) | eval malware_family=coalesce(signature, file_name, "UNKNOWN") | table _time src_ip lat lon Country City malware_family action severity | sort -_time | head 300
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
description = Malware detection events with geolocation for BDOC threat map
is_visible = true
disabled = false
